name: VM Diagnostics

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Why (audit trail)"
        required: true

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Inspect VM state (read-only)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            cd /opt/pulso
            echo "=== containers ==="
            docker ps -a --format '{{.Names}} | {{.Image}} | {{.Status}} | {{.Ports}}' | head -20
            echo "=== app logs (last 40) ==="
            docker logs --tail 40 pulso-app-1 2>&1 || true
            echo "=== app networks ==="
            docker inspect pulso-app-1 --format '{{range $k, $v := .NetworkSettings.Networks}}{{$k}} {{end}}' 2>/dev/null || true
            echo "=== db networks (pre-sync config survivor) ==="
            docker ps --format '{{.Names}}' | grep -i db | head -3
            for c in $(docker ps --format '{{.Names}}' | grep -iE 'pulso.*db|db.*pulso' | head -2); do
              docker inspect "$c" --format "{{.Name}}: networks={{range \$k, \$v := .NetworkSettings.Networks}}{{\$k}} {{end}} mounts={{range .Mounts}}{{.Name}}:{{.Destination}} {{end}}"
            done
            echo "=== docker networks ==="
            docker network ls --format '{{.Name}} {{.Driver}}'
            echo "=== nginx/proxy config referencing pulso ==="
            grep -rE "proxy_pass|server_name" /etc/nginx/sites-enabled/ 2>/dev/null | grep -iB1 -A1 pulso | head -20 || true
            grep -rE "proxy_pass|server_name pulso" /etc/nginx/conf.d/ 2>/dev/null | head -10 || true
            docker ps --format '{{.Names}}' | grep -iE 'nginx|proxy|caddy|traefik' | head -5 || true
            echo "=== compose files in /opt/pulso ==="
            ls -la /opt/pulso/*.yml /opt/pulso/*.yaml 2>/dev/null || true
            echo "=== current compose (first 60 lines) ==="
            head -60 /opt/pulso/docker-compose.yml
