name: Deploy

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      reason:
        description: "Deploy reason (for the audit trail)"
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU (multi-platform)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Image name derives from the repository (lowercased — required by GHCR),
      # so forks publish to their own namespace with zero config.
      - name: Compute image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY@L}" >> "$GITHUB_ENV"

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest

  # Self-hoster-specific half: SSHs into the maintainer's server. Forks get the
  # build-and-push job out of the box; to enable deploys, set the repository
  # variable DEPLOY_ENABLED=true and the VM_HOST / VM_USER / VM_SSH_KEY secrets.
  deploy:
    needs: build-and-push
    if: vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Deploy to VM
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          envs: GHCR_TOKEN
          script: |
            set -e
            cd /opt/pulso
            # Self-healing VM state: force GITHUB_OWNER to the deploying repo's owner
            # (the image is pushed to that namespace) and sync the compose file from
            # the exact sha being deployed — the VM never drifts from the repo.
            if grep -q '^GITHUB_OWNER=' .env; then
              sed -i 's/^GITHUB_OWNER=.*/GITHUB_OWNER=${{ github.repository_owner }}/' .env
            else
              echo "GITHUB_OWNER=${{ github.repository_owner }}" >> .env
            fi
            curl -fsSL "https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/docker-compose.yml" -o docker-compose.yml
            echo "VM config: GITHUB_OWNER=$(grep '^GITHUB_OWNER=' .env | cut -d= -f2), compose synced from ${{ github.sha }}"
            echo "$GHCR_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            echo "IMAGE_TAG=${{ github.sha }}" > .env.deploy
            docker compose --env-file .env pull app
            docker compose --env-file .env up -d
            until docker compose --env-file .env exec db pg_isready -U pulso; do sleep 2; done
            docker compose --env-file .env exec app alembic upgrade head
            echo "Deploy OK: ${{ github.sha }}"
