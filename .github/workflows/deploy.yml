name: Deploy

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      reason:
        description: "Motivo del deploy (auditable)"
        required: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login a GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build y push imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/rlcuevas14/eduk3-pulso:${{ github.sha }}
            ghcr.io/rlcuevas14/eduk3-pulso:latest

      - name: Deploy en VM
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          envs: GHCR_TOKEN
          script: |
            cd /opt/pulso
            echo "$GHCR_TOKEN" | docker login ghcr.io -u rlcuevas14 --password-stdin
            echo "IMAGE_TAG=${{ github.sha }}" > .env.deploy
            docker compose --env-file .env pull app
            docker compose --env-file .env up -d
            docker compose --env-file .env exec app sh -c 'until pg_isready -h db -U pulso; do sleep 2; done'
            docker compose --env-file .env exec app alembic upgrade head
            echo "Deploy OK: ${{ github.sha }}"
