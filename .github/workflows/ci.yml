name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: pulso
          POSTGRES_PASSWORD: test
          POSTGRES_DB: pulso_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pulso"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_DATABASE_URL: postgresql+asyncpg://pulso:test@localhost:5432/pulso_test
      SECRET_KEY: test-secret
      DEBUG: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependencias
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy app/ --ignore-missing-imports

      - name: Tests
        run: pytest tests/ -v --tb=short
