{% extends "base.html" %}
{% block title %}{{ t("account.password_title") }}{% endblock %}
{% block content %}
<div class="max-w-md mx-auto">
  <h1 class="text-2xl font-semibold tracking-tight text-ink mb-6">{{ t("account.password_heading") }}</h1>
  {% if error %}
  <div class="bg-error/10 border border-error/30 text-error rounded-xl px-4 py-3 text-sm mb-4">{{ error }}</div>
  {% endif %}
  <form method="post" action="/auth/password" class="p-card p-5 space-y-4">
    <div>
      <label class="p-label" for="pw-current">{{ t("account.password_current") }}</label>
      <input id="pw-current" name="current_password" type="password" required
             autocomplete="current-password" class="p-input">
    </div>
    <div>
      <label class="p-label" for="pw-new">{{ t("account.password_new") }}</label>
      <input id="pw-new" name="new_password" type="password" required minlength="8"
             autocomplete="new-password" placeholder="{{ t('setup.password_placeholder') }}" class="p-input">
    </div>
    <div>
      <label class="p-label" for="pw-confirm">{{ t("account.password_confirm") }}</label>
      <input id="pw-confirm" name="confirm_password" type="password" required minlength="8"
             autocomplete="new-password" class="p-input">
    </div>
    <button type="submit" class="p-btn p-btn-primary">{{ t("common.save") }}</button>
  </form>
</div>
{% endblock %}
