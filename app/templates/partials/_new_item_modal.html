{# Modal «Nuevo ítem» — requiere `scopes` en el contexto. Abrir con openModal('new-item-modal'). #}
<div id="new-item-modal" data-modal role="dialog" aria-modal="true" aria-labelledby="new-item-title"
     class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-[95] p-4">
  <div class="p-card w-full max-w-lg p-6">
    <h2 id="new-item-title" class="text-lg font-semibold text-ink mb-4">{{ t("new_item.heading") }}</h2>
    <form action="/ui/items/create" method="post" class="space-y-4">
      <div>
        <label class="p-label" for="ni-title">{{ t("new_item.field_title") }}</label>
        <input id="ni-title" name="title" required placeholder="{{ t('new_item.field_title') }}" aria-label="{{ t('new_item.title_aria') }}" class="p-input">
      </div>
      <div class="flex gap-3">
        <div class="flex-1">
          <label class="p-label" for="ni-scope">{{ t("new_item.field_scope") }}</label>
          <select id="ni-scope" name="scope_id" required aria-label="{{ t('new_item.scope_aria') }}" class="p-input">
            {% for s in scopes %}<option value="{{ s.id }}">{{ s.name }}</option>{% endfor %}
          </select>
        </div>
        <div class="flex-1">
          <label class="p-label" for="ni-type">{{ t("new_item.field_type") }}</label>
          <select id="ni-type" name="type" required aria-label="{{ t('new_item.type_aria') }}" class="p-input">
            {% for ty in ['feature','bug','tech-debt','infra','docs','ops','security','product','idea'] %}
            <option value="{{ ty }}">{{ t("type." ~ ty) }}</option>{% endfor %}
          </select>
        </div>
      </div>
      <div>
        <label class="p-label" for="ni-summary">{{ t("new_item.field_summary") }}</label>
        <textarea id="ni-summary" name="summary_md" rows="3" placeholder="{{ t('new_item.summary_placeholder') }}"
                  aria-label="{{ t('new_item.summary_aria') }}" class="p-input"></textarea>
      </div>
      <p class="text-xs text-muted">{{ t("new_item.backlog_note") | safe }}</p>
      <div class="flex justify-end gap-2 pt-1">
        <button type="button" onclick="closeModal('new-item-modal')" class="p-btn p-btn-ghost p-btn-sm">{{ t("common.cancel") }}</button>
        <button type="submit" class="p-btn p-btn-primary p-btn-sm">{{ t("new_item.submit") }}</button>
      </div>
    </form>
  </div>
</div>
