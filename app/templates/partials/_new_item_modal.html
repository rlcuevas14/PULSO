{# Modal «Nuevo ítem» — requiere `scopes` en el contexto. Abrir con openModal('new-item-modal'). #}
<div id="new-item-modal" data-modal role="dialog" aria-modal="true" aria-labelledby="new-item-title"
     class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-[95] p-4">
  <div class="p-card w-full max-w-lg p-6">
    <h2 id="new-item-title" class="text-lg font-semibold text-ink mb-4">Nuevo ítem</h2>
    <form action="/ui/items/create" method="post" class="space-y-4">
      <div>
        <label class="p-label" for="ni-title">Título</label>
        <input id="ni-title" name="title" required placeholder="Título" aria-label="Título del ítem" class="p-input">
      </div>
      <div class="flex gap-3">
        <div class="flex-1">
          <label class="p-label" for="ni-scope">Scope</label>
          <select id="ni-scope" name="scope_id" required aria-label="Scope del ítem" class="p-input">
            {% for s in scopes %}<option value="{{ s.id }}">{{ s.name }}</option>{% endfor %}
          </select>
        </div>
        <div class="flex-1">
          <label class="p-label" for="ni-type">Tipo</label>
          <select id="ni-type" name="type" required aria-label="Tipo del ítem" class="p-input">
            {% for t in ['feature','bug','tech-debt','infra','docs','ops','security','product','idea'] %}
            <option value="{{ t }}">{{ t }}</option>{% endfor %}
          </select>
        </div>
      </div>
      <div>
        <label class="p-label" for="ni-summary">Resumen</label>
        <textarea id="ni-summary" name="summary_md" rows="3" placeholder="Resumen (opcional)"
                  aria-label="Resumen del ítem" class="p-input"></textarea>
      </div>
      <p class="text-xs text-muted">Se crea en estado <strong class="text-body">backlog</strong>. Para una idea cruda sin scope, usa + Idea.</p>
      <div class="flex justify-end gap-2 pt-1">
        <button type="button" onclick="closeModal('new-item-modal')" class="p-btn p-btn-ghost p-btn-sm">Cancelar</button>
        <button type="submit" class="p-btn p-btn-primary p-btn-sm">Crear</button>
      </div>
    </form>
  </div>
</div>
