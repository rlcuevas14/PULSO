{# Subtab nav for the Management section. Context: `subtab` (active), `subtabs` (order). #}
<div class="flex items-center justify-between mb-5 flex-wrap gap-3">
  <h1 class="text-2xl md:text-3xl font-semibold tracking-tight text-ink">{{ t("nav.management") }}</h1>
  <nav class="flex gap-1.5" aria-label="{{ t('nav.management') }}">
    {% for s in subtabs %}
    <a href="/management/{{ s }}"
       class="p-pill border {% if subtab == s %}text-accent-fg{% else %}border-hairline text-body hover:bg-surface-strong{% endif %}"
       {% if subtab == s %}style="background:var(--accent);border-color:var(--accent)"{% endif %}>
      {{ t("management.subtab." ~ s) }}
    </a>
    {% endfor %}
  </nav>
</div>
