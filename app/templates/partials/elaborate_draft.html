<div class="border border-warning/40 bg-warning/5 rounded-xl p-4 mt-3">
  <div class="text-xs text-warning-strong mb-2">
    {{ t("threads.draft_notice", stage=t("stage." ~ draft.stage), model=draft.model|e) | safe }}
  </div>
  <form hx-post="/ui/threads/{{ thread.id }}/advance" hx-swap="none"
        action="/ui/threads/{{ thread.id }}/advance" method="post">
    <textarea name="artifact_content" rows="12" class="p-input font-mono">{{ draft.content }}</textarea>
    <div class="flex justify-end gap-2 mt-2">
      <button type="button" onclick="document.getElementById('draft-area').innerHTML=''"
              class="p-btn p-btn-ghost p-btn-sm">{{ t("threads.discard_draft") }}</button>
      <button type="submit" class="p-btn p-btn-primary p-btn-sm">{{ t("threads.save_and_advance") }}</button>
    </div>
  </form>
</div>
