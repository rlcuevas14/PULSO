<div class="border border-warning/40 bg-warning/5 rounded-xl p-4 mt-3">
  <div class="text-xs text-warning mb-2">
    Borrador IA — stage <strong>{{ draft.stage }}</strong> ({{ draft.model }}). Revísalo y edítalo antes de avanzar.
  </div>
  <form action="/ui/hilos/{{ thread.id }}/advance" method="post">
    <textarea name="artifact_content" rows="12" class="p-input font-mono">{{ draft.content }}</textarea>
    <div class="flex justify-end gap-2 mt-2">
      <button type="button" onclick="this.closest('div').parentElement.innerHTML=''"
              class="p-btn p-btn-ghost p-btn-sm">Descartar borrador</button>
      <button type="submit" class="p-btn p-btn-primary p-btn-sm">Guardar y avanzar ▸</button>
    </div>
  </form>
</div>
