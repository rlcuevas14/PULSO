<!DOCTYPE html>
<html lang="es">
<head>
  <title>Pulso — Sign in</title>
  {% include "partials/_head.html" %}
</head>
<body class="bg-canvas text-body font-sans min-h-screen flex items-center justify-center p-4">
  <button onclick="toggleTheme()" class="fixed top-4 right-4 p-2 rounded-xl text-muted hover:text-ink hover:bg-surface-strong" aria-label="Cambiar tema claro/oscuro">
    <svg class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path stroke-linecap="round" d="M12 2v2m0 16v2M4.9 4.9l1.4 1.4m11.4 11.4 1.4 1.4M2 12h2m16 0h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
    <svg class="w-5 h-5 dark:hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>
  </button>

  <div class="p-card w-full max-w-sm p-8">
    <div class="flex items-center gap-2 mb-1">
      <svg width="28" height="28" viewBox="0 0 48 48" fill="none" aria-hidden="true" class="text-ink">
        <path d="M4 25 H11 L17 13 L24 36 L29 25 H33" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="41" cy="25" r="4.5" fill="#ff4d8b"/>
      </svg>
      <h1 class="text-2xl font-semibold tracking-tight text-ink">pulso</h1>
    </div>
    <p class="text-sm text-muted mb-6">The backlog your agent reads and writes.</p>

    {% if error %}
    <div class="bg-error/10 border border-error/30 text-error rounded-xl px-4 py-3 mb-4 text-sm">
      {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/auth/login" class="space-y-4">
      <div>
        <label class="p-label" for="email">Email</label>
        <input id="email" name="email" type="email" required autofocus class="p-input" placeholder="you@example.com">
      </div>
      <div>
        <label class="p-label" for="password">Password</label>
        <input id="password" name="password" type="password" required class="p-input">
      </div>
      <button type="submit" class="p-btn p-btn-primary w-full">Sign in</button>
    </form>
  </div>
</body>
</html>
