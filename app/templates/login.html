<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulso — Ingresar</title>
  {# TODO: vendorizar/compilar Tailwind para prod (el CDN es solo-dev). #}
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
  <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-sm">
    <h1 class="text-2xl font-bold text-gray-800 mb-2">Pulso</h1>
    <p class="text-sm text-gray-500 mb-6">Gestión de producto · Eduk3</p>

    {% if error %}
    <div class="bg-red-50 border border-red-200 text-red-700 rounded px-4 py-2 mb-4 text-sm">
      {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/auth/login" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1" for="email">Email</label>
        <input
          id="email" name="email" type="email" required autofocus
          class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="tu@email.cl"
        >
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1" for="password">Contraseña</label>
        <input
          id="password" name="password" type="password" required
          class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
        >
      </div>
      <button
        type="submit"
        class="w-full bg-blue-600 text-white rounded px-4 py-2 text-sm font-medium hover:bg-blue-700 transition"
      >
        Ingresar
      </button>
    </form>
  </div>
</body>
</html>
