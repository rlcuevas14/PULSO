services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    volumes:
      - pulso_db:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: pulso
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: pulso
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulso"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    image: ghcr.io/${GITHUB_OWNER:-your-username}/pulso:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://pulso:${DB_PASSWORD}@db/pulso
    ports:
      - "${PORT:-8000}:8000"

volumes:
  pulso_db:
